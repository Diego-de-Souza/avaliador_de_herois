<section class="user-container">
  <app-header-platform></app-header-platform>
  <section class="table-container">
      <h2>Lista de Usuarios</h2>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Nome</th>
            <th>nickname</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for(user of users(); track user){
            <tr>
              <td>{{ user.fullname }}</td>
              <td>{{ user.nickname }}</td>
              <td class="td-acoes-user">
                <button class="btn btn-primary" (click)="editUser(user.id)">Editar</button>
                <button class="btn btn-danger" (click)="deleteUser(user.id)">Deletar</button>
              </td>   
            </tr> 
          }
        </tbody>
      </table>
    </section>
</section>
